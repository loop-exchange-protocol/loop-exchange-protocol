name: 协议提案 / Protocol proposal
description: 提议修改 LXP 可移植行为 / Propose portable behavior
title: "proposal: "
labels: [proposal]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题 / Problem
      description: 协议需要解决什么可移植 use case 或限制？What should the protocol address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提议行为 / Proposed behavior
      description: 描述规范行为、exchange shape 与 failure behavior。
    validations:
      required: true
  - type: textarea
    id: portability
    attributes:
      label: 可移植性与兼容性 / Portability and compatibility
      description: 说明对 Artifact、Provider、Engine 与 standalone Import 的影响。
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: 安全与信任 / Security and trust
      description: 说明 execution、credential、provenance 与 untrusted-input 影响。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives considered
      description: 还有哪些设计或现有机制可以解决问题？What alternatives were considered?
